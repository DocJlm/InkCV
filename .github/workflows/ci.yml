name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache CJK fonts
        uses: actions/cache@v4
        with:
          path: packages/renderer/assets/fonts
          key: noto-cjk-v1
      - run: node packages/renderer/scripts/fetch-fonts.mjs
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @inkcv/web build

  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache CJK fonts
        uses: actions/cache@v4
        with:
          path: packages/renderer/assets/fonts
          key: noto-cjk-v1
      - run: node packages/renderer/scripts/fetch-fonts.mjs
      - run: pnpm exec playwright install --with-deps chromium webkit
      - run: pnpm test:e2e
