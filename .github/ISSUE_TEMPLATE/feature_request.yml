name: 功能建议 / Feature request
description: 提出一个新功能或改进 / Suggest a feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题 / What problem does it solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案 / Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives considered
